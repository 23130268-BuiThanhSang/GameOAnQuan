<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ô Ăn Quan - Web Game</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
</head>
<body>
<div class="player-tray" id="tray-p2">
    <div class="captured-wrapper">
        <div class="captured-visuals"></div> <div class="captured-box">Quân: 0</div>
    </div>

    <div class="avatar-box">P2</div>
    <div class="score-board">Điểm: 0</div>
    <div class="card-slot">Kỹ năng (Trống)</div>
</div>

<div class="board">
    <div id="quan-left" class="quan-zone"></div>
    <div id="quan-right" class="quan-zone"></div>

    <div id="dan-6" class="dan-zone"></div>
    <div id="dan-7" class="dan-zone"></div>
    <div id="dan-8" class="dan-zone"></div>
    <div id="dan-9" class="dan-zone"></div>
    <div id="dan-10" class="dan-zone"></div>

    <div id="dan-0" class="dan-zone"></div>
    <div id="dan-1" class="dan-zone"></div>
    <div id="dan-2" class="dan-zone"></div>
    <div id="dan-3" class="dan-zone"></div>
    <div id="dan-4" class="dan-zone"></div>
</div>

<div class="player-tray" id="tray-p1">
    <div class="captured-wrapper">
        <div class="captured-visuals"></div> <div class="captured-box">Quân: 0</div>
    </div>

    <div class="avatar-box">P1</div>
    <div class="score-board">Điểm: 0</div>
    <div class="card-slot">Kỹ năng (Trống)</div>
</div>

<img id="anim-hand" src="assets/images/hand.png" alt="Hand" style="opacity: 0; position: fixed; top: 0; left: 0; z-index: 9999; pointer-events: none;">

<script src="js/config/constants.js"></script>
<script src="js/api/apiClient.js"></script>
<script src="js/ui/boardRender.js"></script>
<script src="js/ui/animation.js"></script>
<script src="js/core/gameController.js"></script>
<script src="js/main.js"></script>
</body>
</html>
